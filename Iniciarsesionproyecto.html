<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../MiPagina/Iniciarsesionproyecto.css">
</head>
<body class="bg-light">

<div class="container">
  <div class="row justify-content-center align-items-center vh-100">
    <div class="col-md-4">

      <form class="card p-3 shadow">
        <h3 class="text-center mb-4">Iniciar Sesión</h3>

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" placeholder="correo@email.com" required>
        </div>

        <!-- Contraseña -->
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-control" placeholder="********" required>
        </div>

        <!-- Recordar -->
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox">
          <label class="form-check-label">
            Recordarme
          </label>
        </div>

        <!-- Botón -->
        <button type="submit" class="btn btn-primary w-100">
          Ingresar
        </button>

        <!-- Enlaces -->
        <div class="text-center mt-3">
          <a href="#">¿Olvidaste tu contraseña?</a><br>
          <a href="registro.html">Crear cuenta</a>
        </div>
      </form>

    </div>
  </div>
</div>
<a href="../MiPagina/paginaprincipalproyecto.html">Ir a pagina principal</a>
</body>
</html>
